on:
  workflow_dispatch:

name: Timed GitHub Action

jobs:
  timed_action:
    name: Job for timed action
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    container:
      image: rocker/tidyverse:4.2
    permissions:
      contents: write
    
    steps:
      - run: git config --system --add safe.directory '*'
      
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Load Dropbox token
        uses: mobiledevops/secret-to-file-action@v1
        with:
          base64-encoded-secret: ${{ secrets.DROPBOX }}
          filename: "tokenfile.RDS"
    
      - name: Install rdrop2
        run: |
          Rscript -e "devtools::install_github('karthik/rdrop2')"
          Rscript -e "install.packages('here')"
              
      - name: Hello
        run: |
          Rscript preprocess.R

      - name: Commit and push
        run: |
          git config --global user.name 'bpbond'
          git config --global user.email 'bondlamberty@pnnl.gov'
          git add .
          git commit -m "Automated update" || echo "No changes to commit"
          git push
